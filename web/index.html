<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" id="favicon" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <!-- OpenGraph Meta Tags -->
    <meta property="og:title" content="Ech0" />
    <meta
      property="og:description"
      content="Ech0 is an open-source platform for quickly sharing thoughts, text, and links with full data control."
    />
    <meta property="og:image" content="/Ech0.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://github.com/LumiLem/Ech0" />
    <meta property="og:site_name" content="Ech0" />

    <link rel="alternate" type="application/atom+xml" title="Ech0 Atom Feed" href="/rss" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/app.webmanifest" />
    <meta name="theme-color" content="#f4f1ec" />
    <meta
      name="description"
      content="Ech0 is a new-generation open-source self-hosted platform designed for individual users. It is ultra-lightweight and low-cost, supporting the ActivityPub protocol to let you easily publish and share ideas, writings, and links. With a clean, intuitive interface and powerful command-line tools, content management becomes simple and flexible. Your data is fully owned and controlled by you, always connected to the world, building your own network of thoughts."
    />
    <meta
      name="keywords"
      content="Ech0, open-source, fediverse, sharing, thoughts, text, links, privacy, data control, platform, web app"
    />
    <meta name="author" content="Ech0 Team" />

    <title>Ech0</title>

    <link preload rel="stylesheet" href="/src/assets/main.css" />

    <link rel="stylesheet" href="/others/styles/APlayer.min.css" />
    <script src="/others/scripts/APlayer.min.js"></script>
    <!-- require MetingJS -->
    <script src="/others/scripts/Meting.min.js"></script>

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Ech0",
        "url": "https://github.com/LumiLem/Ech0",
        "description": "A next-generation open-source, self-hosted, lightweight federated publishing platform focused on personal idea sharing.",
        "publisher": {
          "@type": "Organization",
          "name": "Ech0 Team"
        },
        "sameAs": ["https://github.com/LumiLem/Ech0"]
      }
    </script>

    <!-- Canonical -->
    <link rel="canonical" href="https://github.com/LumiLem/Ech0" />
  </head>

  <body>
    <div id="app">
      <div id="app-loader">
        <div class="loader"></div>
        <p> 加载中...</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
